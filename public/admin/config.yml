# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms@0.171.1/schema/sveltia-cms.json

backend:
  name: github
  repo: cloudydreamland/xianmeng-yuncun
  branch: main
  auth_methods: [oauth]
  squash_merges: true
  # OAuth Worker 部署后补充 base_url，不在此文件保存任何密钥。

publish_mode: editorial_workflow
# Sveltia 0.171.1 may not implement editorial workflow. Verify before relying on PR-based publishing.
site_url: https://xianmeng-yuncun.pages.dev
display_url: https://xianmeng-yuncun.pages.dev
logo:
  src: /images/village/day/village-mobile.webp
  show_in_header: true
app_title: 云村内容后台

media_folder: /public/uploads
public_folder: /uploads
media_libraries:
  default:
    config:
      max_file_size: 2097152
      slugify_filename: true

output:
  omit_empty_optional_fields: true

collections:
  - name: notes
    label: 笔记
    label_singular: 笔记
    description: 在山窗书屋中编辑文章；站点隐藏与审阅草稿是两种独立状态。
    folder: /src/content/notes
    create: true
    delete: true
    extension: mdx
    format: frontmatter
    slug: '{{fields.slug}}'
    identifier_field: title
    summary: '{{title}} · {{category}} · {{publishedAt}}'
    preview_path: '/notes/{{fields.slug}}/'
    sortable_fields: [publishedAt, updatedAt, title, category]
    fields:
      - { name: title, label: 标题, widget: string, maxlength: 100 }
      - name: slug
        label: slug（网址短名）
        widget: string
        hint: 仅使用小写英文或拼音、数字和短横线；保存后也将成为文件名。
        pattern: ['^[a-z0-9]+(?:-[a-z0-9]+)*$', '请输入小写英文／拼音短横线格式，例如 chun-ri-shan-chuang。']
      - { name: description, label: 摘要, widget: text, maxlength: 240 }
      - { name: publishedAt, label: 发布日期, widget: datetime, type: date, format: 'YYYY-MM-DD', default: '{{now}}' }
      - { name: updatedAt, label: 修订日期, widget: datetime, type: date, format: 'YYYY-MM-DD', required: false }
      - { name: category, label: 分类, widget: string, maxlength: 30 }
      - name: tags
        label: 标签
        widget: list
        min: 1
        hint: 至少填写一个标签。
        field: { name: tag, label: 标签, widget: string, minlength: 1, maxlength: 30 }
      - name: draft
        label: 站点隐藏
        widget: boolean
        default: false
        hint: 开启后，即使内容已进入 main，也不会出现在页面、RSS 或 Sitemap。
      - name: cover
        label: 封面
        widget: image
        required: false
        choose_url: false
        accept: image/avif,image/webp,image/jpeg,image/png,.avif,.webp,.jpg,.jpeg,.png
        hint: 可选；支持 AVIF、WebP、JPEG、PNG，单文件不超过 2MB。
      - { name: coverAlt, label: 封面描述, widget: string, required: false, maxlength: 160, hint: 留空时前台会使用标题作为替代文本。 }
      - { name: body, label: 正文, widget: richtext }

  - name: projects
    label: 项目
    label_singular: 项目
    description: 管理百工阁中的项目档案和详情正文。
    folder: /src/content/projects
    create: true
    delete: true
    extension: mdx
    format: frontmatter
    slug: '{{fields.slug}}'
    identifier_field: title
    summary: '{{title}} · {{status}} · {{period}}'
    preview_path: '/projects/{{fields.slug}}/'
    sortable_fields: [title, status, period, featured]
    fields:
      - { name: title, label: 项目名称, widget: string, maxlength: 100 }
      - name: slug
        label: slug（网址短名）
        widget: string
        hint: 仅使用小写英文或拼音、数字和短横线；保存后也将成为文件名。
        pattern: ['^[a-z0-9]+(?:-[a-z0-9]+)*$', '请输入小写英文／拼音短横线格式，例如 yuncun-blog。']
      - { name: description, label: 项目简介, widget: text, maxlength: 240 }
      - { name: period, label: 时间段, widget: string, hint: 例如 2026.07 — 至今。 }
      - name: status
        label: 状态
        widget: select
        options: [构想中, 进行中, 已完成, 持续维护]
      - name: stack
        label: 技术栈
        widget: list
        min: 1
        hint: 至少填写一项技术或方法。
        field: { name: item, label: 技术, widget: string, minlength: 1, maxlength: 40 }
      - { name: featured, label: 首页精选, widget: boolean, default: false }
      - { name: repoUrl, label: 仓库地址, widget: string, type: url, required: false }
      - { name: demoUrl, label: 演示地址, widget: string, type: url, required: false }
      - name: cover
        label: 封面
        widget: image
        required: false
        choose_url: false
        accept: image/avif,image/webp,image/jpeg,image/png,.avif,.webp,.jpg,.jpeg,.png
        hint: 可选；支持 AVIF、WebP、JPEG、PNG，单文件不超过 2MB。
      - { name: coverAlt, label: 封面描述, widget: string, required: false, maxlength: 160, hint: 留空时前台会使用标题作为替代文本。 }
      - { name: body, label: 项目正文, widget: richtext }
